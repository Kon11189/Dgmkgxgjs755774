<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UpScale Nick Fix</title>
    <style>
        body { margin: 0; background: #050508; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { text-align: center; background: #11111d; padding: 30px; border-radius: 25px; width: 85%; border: 1px solid #00f2fe; }
        #launch-btn { 
            background: #00f2fe; border: none; padding: 25px; border-radius: 15px; 
            color: #000; font-size: 20px; width: 100%; cursor: pointer; font-weight: bold;
        }
        #launch-btn.listening { background: #ff3e3e; color: #fff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #status { margin: 20px 0; color: #00f2fe; font-weight: bold; font-size: 14px; }
        #console { background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 12px; border-radius: 10px; height: 150px; overflow-y: auto; text-align: left; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="card">
    <h1>UPSCALE</h1>
    <div id="status">Нажми и говори</div>
    <button id="launch-btn">START NICK</button>
    <div id="console">> Система готова</div>
</div>

<script>
    const API_KEY = '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';
    const MODEL = 'google/gemini-2.0-flash-lite-preview-02-05';

    const btn = document.getElementById('launch-btn');
    const status = document.getElementById('status');
    const cons = document.getElementById('console');

    function log(msg) { cons.innerHTML += `<div>> ${msg}</div>`; cons.scrollTop = cons.scrollHeight; }

    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new Speech();
    rec.lang = 'ru-RU';
    rec.continuous = false; // Авто-стоп при тишине
    rec.interimResults = false;

    btn.onclick = () => {
        try {
            rec.start();
            btn.classList.add('listening');
            btn.innerText = "СЛУШАЮ...";
            status.innerText = "Говорите фразу...";
            log("Микрофон активирован");
        } catch(e) { log("Ошибка: " + e.message); }
    };

    rec.onresult = (e) => {
        const text = e.results[0][0].transcript;
        log("ТЫ: " + text);
        askNick(text);
    };

    rec.onspeechend = () => {
        rec.stop();
        btn.classList.remove('listening');
        btn.innerText = "START NICK";
        status.innerText = "Обработка запроса...";
        log("Речь закончена, отправляю...");
    };

    rec.onerror = (e) => {
        log("ЛОГ: " + e.error);
        btn.classList.remove('listening');
        btn.innerText = "START NICK";
    };

    async function askNick(text) {
        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ "model": MODEL, "messages": [{"role": "user", "content": text}] })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            log("НИК ОТВЕТИЛ!");
            speak(reply);
        } catch(e) { log("Ошибка сети"); }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(text);
        m.lang = 'ru-RU';
        window.speechSynthesis.speak(m);
        m.onend = () => status.innerText = "Готов к работе";
    }
</script>
</body>
</html>
