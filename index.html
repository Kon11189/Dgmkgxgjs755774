<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UpScale AI Site</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { text-align: center; background: #12121c; padding: 30px; border-radius: 25px; width: 85%; border: 1px solid #00f2fe; box-shadow: 0 0 30px rgba(0, 242, 254, 0.15); }
        #launch-btn { 
            background: linear-gradient(135deg, #00f2fe, #4facfe); border: none; padding: 25px; 
            border-radius: 15px; color: #000; font-size: 22px; width: 100%; cursor: pointer; font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.3); outline: none; -webkit-tap-highlight-color: transparent;
        }
        #launch-btn.active { background: #ff4b2b; color: white; box-shadow: 0 0 20px #ff4b2b; }
        #status { margin: 20px 0; color: #00f2fe; font-size: 14px; letter-spacing: 1px; }
        #console { background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 12px; border-radius: 10px; height: 100px; overflow-y: auto; text-align: left; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="margin:0 0 10px 0; letter-spacing: 2px;">UPSCALE</h1>
    <div id="status">Нажми кнопку и говори</div>
    <button id="launch-btn">LAUNCH AD</button>
    <div id="console">Система 2.5 Lite готова...</div>
</div>

<script>
    const API_KEY = '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';
    const MODEL = 'google/gemini-2.0-flash-lite-preview-02-05';

    const btn = document.getElementById('launch-btn');
    const status = document.getElementById('status');
    const cons = document.getElementById('console');

    let recognition;
    let recording = false;

    function log(msg) { 
        cons.innerHTML += `<div>> ${msg}</div>`; 
        cons.scrollTop = cons.scrollHeight; 
    }

    // Создаем объект распознавания один раз
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Speech) {
        recognition = new Speech();
        recognition.lang = 'ru-RU';
        recognition.continuous = false; // Важно: для мобилок лучше порциями
        recognition.interimResults = false;

        recognition.onstart = () => { log("Микрофон включен!"); };
        
        recognition.onresult = (e) => {
            const text = e.results[0][0].transcript;
            log("ТЫ: " + text);
            sendRequest(text);
        };

        recognition.onerror = (e) => {
            log("ОШИБКА: " + e.error);
            if (e.error === 'aborted' && recording) {
                log("Попытка восстановления...");
                setTimeout(() => { if(recording) recognition.start(); }, 100);
            }
        };

        recognition.onend = () => {
            if (recording) {
                log("Микрофон уснул. Пробуждаю...");
                recognition.start();
            }
        };
    }

    btn.onclick = () => {
        if (!recording) {
            recording = true;
            btn.classList.add('active');
            btn.innerText = "ГОВОРИ (СТОП)";
            status.innerText = "СЛУШАЮ...";
            try {
                recognition.start();
            } catch(e) { log("Ошибка старта: " + e.message); }
        } else {
            stopAll();
        }
    };

    function stopAll() {
        recording = false;
        btn.classList.remove('active');
        btn.innerText = "LAUNCH AD";
        status.innerText = "ОБРАБОТКА...";
        recognition.stop();
        log("Запись завершена.");
    }

    async function sendRequest(text) {
        log("Запрос к Gemini 2.5...");
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": MODEL,
                    "messages": [{"role": "user", "content": text}]
                })
            });
            const data = await response.json();
            if (data.choices) {
                const reply = data.choices[0].message.content;
                log("ОТВЕТ ПОЛУЧЕН!");
                speak(reply);
            } else {
                log("Ошибка API: " + JSON.stringify(data.error));
            }
        } catch(e) { log("Сбой сети: " + e.message); }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(text);
        m.lang = 'ru-RU';
        window.speechSynthesis.speak(m);
        m.onend = () => { status.innerText = "ГОТОВ"; log("Конец связи."); };
    }
</script>
</body>
</html>
