<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Retro Terminal</title>
    <style>
        body {
            background-color: black;
            color: #00FF41; /* Классический цвет матричного принтера/терминала */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #terminal {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            line-height: 1.2;
            white-space: pre-wrap;
        }

        #balance-container {
            display: none; /* Скрыт в начале */
            text-align: center;
            border: 2px solid #004400;
            padding: 40px;
            background: rgba(0, 20, 0, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .lcd-text {
            font-size: 64px;
            color: #33FF33;
            text-shadow: 0 0 10px rgba(51, 255, 51, 0.8), 0 0 20px rgba(51, 255, 51, 0.4);
            letter-spacing: 5px;
        }

        .label {
            font-size: 18px;
            margin-bottom: 10px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* Эффект мерцания экрана */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0.75;
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

<div class="scanline"></div>
<div id="terminal"></div>

<div id="balance-container">
    <div class="label">Current Balance</div>
    <div id="balance" class="lcd-text">0.0000$</div>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const balanceContainer = document.getElementById('balance-container');
    const balanceDisplay = document.getElementById('balance');

    // Текст для симуляции загрузки
    const bootLogs = [
        "INITIALIZING SYSTEM...",
        "LOADING KERNEL V.4.0.2-RELEASE",
        "ESTABLISHING SECURE CONNECTION...",
        "BYPASSING FIREWALL... DONE",
        "ACCESSING ENCRYPTED NODE...",
        "DECRYPTING ACCOUNT DATA...",
        "MOUNTING VIRTUAL DRIVE /DEV/SDA1",
        "HANDSHAKE PROTOCOL: SUCCESSFUL",
        "SYNCING WITH GLOBAL LEDGER...",
        "ACCESS GRANTED."
    ];

    let logIndex = 0;
    let balance = 0.0000;

    // Функция печати логов
    function printLogs() {
        if (logIndex < bootLogs.length) {
            const line = document.createElement('div');
            line.textContent = `> ${bootLogs[logIndex]}`;
            terminal.appendChild(line);
            logIndex++;
            setTimeout(printLogs, 450); // Интервал печати строк
        } else {
            // Через 5 секунд (суммарно) скрываем логи и показываем баланс
            setTimeout(() => {
                terminal.style.display = 'none';
                balanceContainer.style.display = 'block';
                startIncome();
            }, 1000);
        }
    }

    // Функция счетчика (1$ в минуту = ~0.0166$ в сек)
    function startIncome() {
        const incomePerSecond = 1 / 60; 
        const tickRate = 100; // обновляем каждые 100мс для плавности
        
        setInterval(() => {
            balance += incomePerSecond / (1000 / tickRate);
            balanceDisplay.textContent = balance.toFixed(4) + '$';
        }, tickRate);
    }

    // Запуск процесса через секунду после загрузки страницы
    setTimeout(printLogs, 500);

</script>
</body>
</html>
