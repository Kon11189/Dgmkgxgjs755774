<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_FAILURE_ERR_0x88</title>
    <style>
        body {
            background-color: #000;
            color: #0dff00; /* Яркий «ядовитый» зеленый */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden; /* Запрещаем прокрутку, чтобы текст просто летел */
            height: 100vh;
        }

        #terminal {
            width: 100vw;
            height: 100vh;
            padding: 5px;
            font-size: 11px;
            line-height: 1;
            word-break: break-all;
            white-space: pre-wrap;
            display: flex;
            flex-direction: column-reverse; /* Новые строки появляются снизу и толкают старые вверх */
        }

        /* Эффект помех (глюков) */
        .glitch {
            animation: glitch 0.2s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); color: #55ff55; }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* Полоски развертки как на старом ТВ */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="scanlines"></div>
<div id="terminal"></div>

<script>
    const term = document.getElementById('terminal');
    
    // Фрагменты кода для имитации вируса
    const virusCode = [
        "FATAL ERROR: KERNEL_SECURITY_CHECK_FAILURE",
        "INJECTING EXPLOIT TO 0x88234FF...",
        "BYPASSING SYSTEM AUTHENTICATION...",
        "OVERRIDING ROOT PERMISSIONS...",
        "WORM_REPLICATING_IN_DIRECTORY /SYS/BIN/",
        "ERASING BOOT SECTOR...",
        "01001001 01001110 01010110 01000001 01000100",
        "CONNECTING TO REMOTE C&C SERVER... SUCCESS",
        "PARSING ENCRYPTED DATABASE...",
        "0x000000 0x000001 0x000002 0x000003",
        "[[ ACCESS VIOLATION ]]",
        "SYSTEM_HALTED_DUE_TO_UNAUTHORIZED_ACCESS"
    ];

    let startTime = Date.now();

    function triggerVirus() {
        let elapsed = Date.now() - startTime;

        if (elapsed < 10000) { // Длится 10 секунд
            // Генерируем пачку строк за один раз для бешеной скорости
            for(let i = 0; i < 15; i++) {
                let span = document.createElement('span');
                
                // Рандомно выбираем: либо осмысленный текст, либо случайный мусор
                let content = Math.random() > 0.5 
                    ? virusCode[Math.floor(Math.random() * virusCode.length)] 
                    : Math.random().toString(36).substring(2).repeat(3);
                
                span.textContent = content + " " + (Math.random() * 100000).toString(16).toUpperCase();
                
                // Иногда добавляем красные строки для эффекта ошибок
                if (Math.random() > 0.9) {
                    span.style.color = "#ff0000";
                    span.style.fontWeight = "bold";
                }

                term.appendChild(span);
            }

            // Ограничиваем количество элементов, чтобы браузер не завис окончательно
            if (term.childNodes.length > 500) {
                term.removeChild(term.firstChild);
            }

            requestAnimationFrame(triggerVirus);
        } else {
            // Финал через 10 секунд
            term.innerHTML = "<div style='color:red; font-size:40px; text-align:center; margin-top:20%; font-weight:bold;' class='glitch'>SYSTEM COMPROMISED<br><br>...GOODBYE...</div>";
        }
    }

    // Запуск через 1 секунду черного экрана
    setTimeout(triggerVirus, 1000);
</script>

</body>
</html>
